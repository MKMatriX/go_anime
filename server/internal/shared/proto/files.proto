syntax = "proto3";

package files;

option go_package = "/internal/shared/proto/files/";

service FileService {
    rpc DownloadFile(DownloadFileRequest) returns (DownloadFileResponse);
}

message DownloadFileRequest {
	string url = 1;
}

message DownloadFileResponse {
	string path = 1;
	string error = 2;
}

