syntax = "proto3";

package anidb;

option go_package = "go_anime/internal/shared/proto/anidb";

service AniDBService {
  rpc GetAniDBId(GetAniDBIdRequest) returns (GetAniDBIdResponse);
  rpc AutocompleteSearch(GetAniDBIdRequest) returns (AnimeTitles);
  rpc GetOtherNames(AnimeIdRequest) returns (AnimeTitles);
}

message GetAniDBIdRequest {
  string anime_name = 1;
}

message GetAniDBIdResponse {
  int32 id = 1;
  string error = 2;  // Если ошибка, вернём строку (или используйте status codes)
}

message AnimeTitle {
  int32 anime_id = 1;
  string type = 2;
  string lang = 3;
  string title = 4;
}

message AnimeTitles {
  repeated AnimeTitle titles = 1;
  string error = 2;
}

message AnimeIdRequest {
  int32 anime_id = 1;
}